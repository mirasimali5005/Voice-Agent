server:
  port: 8080

spring:
  application:
    name: voice-agent-api

  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:voiceagent}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          # JWT decoding is handled by our custom JwtDecoder bean in SecurityConfig.
          # This section is kept as a placeholder; the HS256 secret-based decoder
          # is configured programmatically using supabase.jwt-secret.

# Supabase configuration
supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET:your-supabase-jwt-secret}

# Cloudflare Workers AI configuration
cloudflare:
  account-id: ${CLOUDFLARE_ACCOUNT_ID:your-account-id}
  api-token: ${CLOUDFLARE_API_TOKEN:your-api-token}
  base-url: https://api.cloudflare.com/client/v4/accounts

# CORS configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:8080

logging:
  level:
    com.voiceagent: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
